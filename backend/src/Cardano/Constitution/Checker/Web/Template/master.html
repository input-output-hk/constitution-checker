<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="styleguide.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/htmx.org@1.9.9"></script>
    <script>
      function clearAndTriggerHTMX(inputId) {
        // Clear the input value
        var inputElement = document.getElementById(inputId);
        console.log(inputId, inputElement);
        inputElement.value = "";

        // Manually trigger the changed event
        var event = new Event("changed", {
          bubbles: true,
          cancelable: true,
        });
        inputElement.dispatchEvent(event);

        // Manually trigger the blur event
        var blurEvent = new Event("blur", {
          bubbles: true,
          cancelable: true,
        });
        inputElement.dispatchEvent(blurEvent);
      }
    </script>
  </head>
  <body>
    <form name="hx-post" ="/params-check">
      <div class="desktop">
        <div class="sidebar">
          <div class="header">
            <img class="untitled-design" src="img/untitled-design-1.png" />
            <div class="text-wrapper">Proposal Parameter Checker</div>
          </div>
          <div class="separator">
            <img class="divider" src="img/divider-1.svg" />
          </div>
          <div class="parameters">
            <div class="params-header">
              <div class="label-and-refresh">
                <div class="div">Import Parameters</div>
                <div class="icon-button">
                  <div class="container">
                    <div class="state-layer">
                      <img
                        class="unselected-icon"
                        src="img/unselected-icon.png"
                      />
                      <img class="selected-icon" src="img/selected-icon.svg" />
                    </div>
                  </div>
                </div>
              </div>
              <div class="buttons">
                <div class="segment-start">
                  <div class="state-layer-wrapper">
                    <div class="state-layer-2">
                      <img class="img" src="img/selected-icon-1.svg" />
                      <div class="label-text">Local File</div>
                    </div>
                  </div>
                </div>
                <div class="container-wrapper">
                  <div class="div-wrapper">
                    <div class="label-text-wrapper">
                      <div class="label-text-2">URL</div>
                    </div>
                  </div>
                </div>
                <div class="container-wrapper">
                  <div class="container-2">
                    <div class="label-text-wrapper">
                      <div class="label-text-3">Cardano State</div>
                    </div>
                  </div>
                </div>
              </div>
              <button class="button">
                <div class="state-layer-3">
                  <img class="icon" src="img/icon-3.svg" />
                  <div class="label-text-4">Upload local JSON file</div>
                </div>
              </button>
            </div>
            <div class="params-list">
              <div class="text-wrapper-2">Change Parameter Value</div>
              <div class="inputs" id="inputs">$inputs</div>
            </div>
          </div>
        </div>
        $mainView
      </div>
    </form>
  </body>
</html>
